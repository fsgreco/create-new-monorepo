on:
  push:
    branches:
      - main
      
permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout project
        uses: actions/checkout@v6
      - name: Setup project
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # - name: Publish on npm
      #   id: publish-npm
      #   uses: JS-DevTools/npm-publish@v4
      #   with:
      #     token: ${{ secrets.NPM_TOKEN }}
      - name: Publish on npm
        id: publish-npm
        run: |
          echo "version=$(npm pkg get version | tr -d '"')" >> "$GITHUB_OUTPUT"
          npm publish

      - name: Notify new version via Telegram
        if: success() 
        run: |
          curl -s \
          -d "chat_id=${{ secrets.CHAT_ID }}" \
          -d "text=📦 <strong>${{ github.repository }}</strong>:%0ANew version published <pre>v${{ steps.publish-npm.outputs.version }}</pre>" \
          https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage?parse_mode=html > /dev/null
